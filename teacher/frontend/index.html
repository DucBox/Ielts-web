<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Teacher Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Mobile sidebar backdrop -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeMobileSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">IELTS Teacher</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Đóng/mở sidebar">‹</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#/classes" class="nav-link" data-route="classes">
        <span class="nav-icon">🏫</span><span class="nav-label"> Lớp học</span>
      </a>
      <a href="#/inbox" class="nav-link" data-route="inbox">
        <span class="nav-icon">📥</span><span class="nav-label"> Cần chấm <span id="inbox-badge" class="inbox-badge hidden"></span></span>
      </a>
      <a href="#/questions" class="nav-link" data-route="questions">
        <span class="nav-icon">📚</span><span class="nav-label"> Kho đề</span>
      </a>
      <a href="#/profile-fields" class="nav-link" data-route="profile-fields">
        <span class="nav-icon">👤</span><span class="nav-label"> Hồ sơ HS</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="dark-mode-toggle" class="btn-dark-toggle" onclick="toggleDarkMode()" title="Chuyển giao diện sáng/tối">🌙</button>
    </div>
  </aside>

  <!-- Mobile hamburger button (fixed, visible only on mobile) -->
  <button class="mobile-hamburger" id="mobile-hamburger" onclick="openMobileSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Main content -->
  <main class="main">
    <div id="app">
      <div class="loading-screen">
        <div class="spinner"></div>
        <p>Đang tải...</p>
      </div>
    </div>
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
